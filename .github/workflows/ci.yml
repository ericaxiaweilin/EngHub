name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      PYTEST_ADDOPTS: -o asyncio_default_fixture_loop_scope=function
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile backend modules
        run: |
          python -m py_compile \
            main.py \
            database/db_config.py \
            database/models.py \
            api/routes/__init__.py \
            api/routes/sim_erp_routes.py \
            api/services/sim_erp_audit_service.py \
            core/sim_erp/*.py \
            core/sim_erp/plugins/*.py

      - name: Run Sim-ERP unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
        run: pytest -q tests/unit/test_sim_erp.py

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  docker-build:
    needs: [backend-checks, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.backend
          push: false
          tags: enghub-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.frontend
          push: false
          tags: enghub-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [docker-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Upload application source
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "api,core,database,docker,frontend,integrations,main.py,requirements.txt"
          target: "/home/eric/enghub"
          overwrite: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            mkdir -p /home/eric/enghub
            printf '%s' '${{ github.sha }}' > /home/eric/enghub/.vone_sync_commit
            cd /home/eric/enghub/docker
            docker compose -f docker-compose.minimal.yml up -d --build postgres redis backend frontend
            docker exec -i docker-postgres-1 psql -U enghub -d enghub -f /home/eric/enghub/database/migrations/004_sim_erp_audit_logs.sql
            docker system prune -f
